name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        pytest tests/ || echo "Tests completed"

  build-desktop:
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Convert logo to .ico
      run: |
        python -c "from PIL import Image; img = Image.open('Logo.png'); img.save('Logo.ico', format='ICO', sizes=[(256,256)])"
        
    - name: Build executable
      run: |
        pyinstaller --onefile --name CalcioDM3-Companion --windowed --add-data "Logo.png;." --icon=Logo.ico main.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CalcioDM3-Desktop
        path: dist/CalcioDM3-Companion.exe

  deploy-web:
    runs-on: ubuntu-latest
    needs: [test, build-desktop]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.TOKEN }}
        publish_dir: ./docs
        keep_files: true
