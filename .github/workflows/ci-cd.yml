name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests Pillow pytest
        
    - name: Run tests
      run: |
        pytest tests/

  build-desktop:
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests Pillow pyinstaller
        
    - name: Convert logo to .ico
      run: |
        pip install pillow
        python -c "from PIL import Image; img = Image.open('Logo.png'); img.save('Logo.ico', format='ICO', sizes=[(256, 256)])"
        
    - name: Build executable
      run: |
        pyinstaller --onefile --name CalcioDM3-Companion --windowed --add-data "Logo.png;." --icon=Logo.ico main.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: CalcioDM3-Desktop
        path: dist/CalcioDM3-Companion.exe

  deploy-web:
    runs-on: ubuntu-latest
    needs: [test, build-desktop]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.TOKEN }}
        publish_dir: ./docs
        keep_files: true
